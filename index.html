<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SILICON TERMINAL</title>
    <style>
        :root { --main-color: #ffffff; --bg-color: #0a0a0a; --accent: #333; }
        body { background-color: var(--bg-color); color: var(--main-color); font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .terminal { width: 450px; text-align: center; border: 1px solid var(--accent); padding: 40px; border-radius: 4px; background: linear-gradient(145deg, #0f0f0f, #050505); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        
        /* Sleek Silicon Header */
        h1 { font-size: 3rem; font-weight: 200; letter-spacing: 12px; margin: 0 0 40px 0; text-transform: uppercase; border-bottom: 1px solid #222; display: inline-block; padding-bottom: 10px; }
        
        .label-text { font-style: italic; font-size: 0.8rem; color: #666; margin-bottom: 10px; letter-spacing: 2px; }
        
        .key-container { background: #000; border: 1px solid #222; padding: 20px; min-height: 100px; margin-bottom: 30px; border-radius: 2px; position: relative; }
        .key-row { font-family: 'Courier New', monospace; font-size: 0.85rem; margin: 10px 0; color: #eee; word-break: break-all; border-bottom: 1px solid #111; padding-bottom: 5px; }
        
        button { background: transparent; border: 1px solid var(--main-color); color: var(--main-color); padding: 12px 30px; font-family: inherit; font-size: 0.9rem; letter-spacing: 3px; cursor: pointer; transition: all 0.3s ease; text-transform: uppercase; }
        button:hover:not(:disabled) { background: var(--main-color); color: var(--bg-color); box-shadow: 0 0 15px rgba(255,255,255,0.2); }
        button:disabled { border-color: #333; color: #333; cursor: not-allowed; }

        #cooldown { font-size: 0.7rem; color: #ff4444; margin-top: 15px; font-weight: bold; height: 20px; }
        .decor { font-size: 10px; color: #222; margin-top: 30px; letter-spacing: 5px; }
    </style>
</head>
<body>

<div class="terminal">
    <h1>Silicon.</h1>
    
    <div class="label-text">ENCRYPTED KEY OUTPUT [3X]</div>
    
    <div class="key-container" id="output">
        <div class="key-row">ACCESS WAITING...</div>
        <div class="key-row">ACCESS WAITING...</div>
        <div class="key-row">ACCESS WAITING...</div>
    </div>

    <button id="genBtn" onclick="initGen()">Initialize</button>
    <div id="cooldown"></div>

    <div class="decor">MULTI-PLATFORM // HANDSHAKE_v3</div>
</div>

<script>
    const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    const numbers = "0123456789";
    const symbols = "!@#$%^&*()_+-=[]{}|;:,.<>?";

    function getRandom(set, len) {
        let res = "";
        for(let i=0; i<len; i++) res += set.charAt(Math.floor(Math.random() * set.length));
        return res;
    }

    function generateLuhn() {
        let digits = Array.from({length: 15}, () => Math.floor(Math.random() * 10));
        let sum = 0;
        for (let i = 0; i < 15; i++) {
            let d = digits[i];
            if (i % 2 === 0) {
                d *= 2;
                if (d > 9) d -= 9;
            }
            sum += d;
        }
        let checkDigit = (10 - (sum % 10)) % 10;
        return digits.join('') + checkDigit;
    }

    function generatePatternKey() {
        // Pattern: LLLSSSNNNLSNCCCCCCCCCCCCCCCCLLLS
        let L3 = getRandom(letters, 3);
        let S3 = getRandom(symbols, 3);
        let N3 = getRandom(numbers, 3);
        let L1 = getRandom(letters, 1);
        let S1 = getRandom(symbols, 1);
        let N1 = getRandom(numbers, 1);
        let C16 = generateLuhn();
        let L3_end = getRandom(letters, 3);
        let S1_end = getRandom(symbols, 1);
        
        return L3 + S3 + N3 + L1 + S1 + N1 + C16 + L3_end + S1_end;
    }

    function initGen() {
        const output = document.getElementById('output');
        const btn = document.getElementById('genBtn');
        
        output.innerHTML = '';
        for(let i=0; i<3; i++) {
            const el = document.createElement('div');
            el.className = 'key-row';
            el.innerText = generatePatternKey();
            output.appendChild(el);
        }

        const expiry = Date.now() + (6 * 60 * 60 * 1000);
        localStorage.setItem('silicon_cooldown', expiry);
        checkCooldown();
    }

    function checkCooldown() {
        const expiry = localStorage.getItem('silicon_cooldown');
        const btn = document.getElementById('genBtn');
        const coolText = document.getElementById('cooldown');

        if (expiry && Date.now() < expiry) {
            btn.disabled = true;
            const updateTimer = setInterval(() => {
                const now = Date.now();
                const diff = expiry - now;
                if (diff <= 0) {
                    clearInterval(updateTimer);
                    btn.disabled = false;
                    coolText.innerText = '';
                    localStorage.removeItem('silicon_cooldown');
                    return;
                }
                const h = Math.floor(diff / 3600000);
                const m = Math.floor((diff % 3600000) / 60000);
                const s = Math.floor((diff % 60000) / 1000);
                coolText.innerText = `COOLDOWN ACTIVE: ${h}h ${m}m ${s}s`;
            }, 1000);
        }
    }

    window.onload = checkCooldown;
</script>

</body>
</html>
